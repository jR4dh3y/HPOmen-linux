<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="root">
    <allow own="io.github.radhey.VictusControl1"/>
    <allow send_destination="io.github.radhey.VictusControl1"/>
  </policy>

  <policy context="default">
    <allow send_destination="io.github.radhey.VictusControl1"/>
    <allow receive_sender="io.github.radhey.VictusControl1"/>
  </policy>
</busconfig>
